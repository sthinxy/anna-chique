name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Prepare GitHub Pages files
        run: |
          echo "Arquivos dentro de dist/client:"
          ls -la dist/client
          echo "Arquivos dentro de dist/client/assets:"
          ls -la dist/client/assets

          CSS_FILE=$(find dist/client/assets -name "styles-*.css" | head -n 1)
          JS_FILE=$(find dist/client/assets -name "index-*.js" -type f -printf "%s %p\n" | sort -nr | head -n 1 | cut -d' ' -f2-)

          echo "CSS encontrado: $CSS_FILE"
          echo "JS encontrado: $JS_FILE"

          CSS_PATH=${CSS_FILE#dist/client/}
          JS_PATH=${JS_FILE#dist/client/}

          cat > dist/client/index.html <<EOF
          <!DOCTYPE html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Anna Chique</title>
              <base href="/annachique/" />
              <link rel="icon" href="/annachique/favicon.ico" />
              <link rel="stylesheet" href="/annachique/$CSS_PATH" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="/annachique/$JS_PATH"></script>
            </body>
          </html>
          EOF

          cp dist/client/index.html dist/client/404.html

          echo "index.html criado:"
          cat dist/client/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
